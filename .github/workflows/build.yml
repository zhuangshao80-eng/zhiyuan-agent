name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
          - os: windows-latest
            script: dist:win
          - os: ubuntu-latest
            script: dist:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Use Git Bash for npm scripts on Windows
        if: runner.os == 'Windows'
        run: npm config set script-shell "C:\\Program Files\\Git\\bin\\bash.exe"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: zhiyuan-agent-${{ matrix.os }}
          path: release/*
          if-no-files-found: error
